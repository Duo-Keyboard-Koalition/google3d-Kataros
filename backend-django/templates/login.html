{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title mb-4 text-center">Login to Kataros</h2>
                    <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        {{ form.non_field_errors }}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Email or Username</label>
                            <input type="text" name="username" autofocus required class="form-control" id="id_username">
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Password</label>
                            <input type="password" name="password" required class="form-control" id="id_password">
                        </div>
                        {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            Invalid credentials. Please try again.
                        </div>
                        {% endif %}
                        <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div class="text-center mt-3">
        <a href="/admin/password_reset/">Forgot password?</a>
    </div>
</div>
{% endblock %}
